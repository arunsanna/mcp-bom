apiVersion: apps/v1
kind: Deployment
metadata:
  name: labeler
  namespace: mcp-bom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: labeler
  template:
    metadata:
      labels:
        app: labeler
    spec:
      containers:
        - name: labeler
          image: registry.arunlabs.com/mcp-bom-labeler:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: labels-data
